};

function hashStringToInt(input) {
    let hash = 2166136261;
    for (let i = 0; i < input.length; i += 1) {
        hash ^= input.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
    }
    return hash >>> 0;
}

function createSeededRandom(seed) {
    let t = seed >>> 0;
    return function random() {
        t += 0x6D2B79F5;
        let r = Math.imul(t ^ (t >>> 15), t | 1);
        r ^= r + Math.imul(r ^ (r >>> 7), r | 61);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
    };
}

function sanitizeApiKey(value) {

function normalizeStockCode(raw, market = 'AUTO') {
    const code = (raw || '').trim().toUpperCase().replace(/\s+/g, '');
    if (!code) return '';
    if (/^[A-Z0-9]+(\.[A-Z]{1,4})$/.test(code)) return code;

    const appendSuffix = (base, suffix) => (base.endsWith(suffix) ? base : `${base}${suffix}`);
    const digits = code.replace(/\D/g, '');
    const marketSafe = market || 'AUTO';

    if (marketSafe === 'CN_A') {
        if (/^\d{6}$/.test(digits)) return digits.startsWith('6') || digits.startsWith('9') ? `${digits}.SS` : `${digits}.SZ`;
        return code;
    }
    if (marketSafe === 'HK') {
        if (/^\d{1,5}$/.test(digits)) return `${digits.padStart(4, '0')}.HK`;
        return appendSuffix(code, '.HK');
    }
    if (marketSafe === 'US') return code;
    if (marketSafe === 'JP') return appendSuffix(code, '.T');
    if (marketSafe === 'UK') return appendSuffix(code, '.L');
    if (marketSafe === 'DE') return appendSuffix(code, '.DE');
    if (marketSafe === 'FR') return appendSuffix(code, '.PA');
    if (marketSafe === 'IN') return appendSuffix(code, '.NS');
    if (marketSafe === 'CA') return appendSuffix(code, '.TO');
    if (marketSafe === 'AU') return appendSuffix(code, '.AX');

    if (/^\d{6}$/.test(code)) {
        return code.startsWith('6') || code.startsWith('9') ? `${code}.SS` : `${code}.SZ`;
    }
    if (/^\d{4,5}$/.test(code)) return `${code.padStart(4, '0')}.HK`;
    return code;
}

function binaryToHexagramNumber(binaryString) {
    const parsed = Number.parseInt(binaryString, 2);
    if (Number.isNaN(parsed)) return 1;
    return (parsed % 64) + 1;
}

function generateHexagramWithChangingLines(stockCode, question) {
    const now = new Date();
    const timeBucket = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}-${now.getHours()}-${now.getMinutes()}`;
    const seedSource = `${stockCode}|${question}|${timeBucket}`;
    const seededRandom = createSeededRandom(hashStringToInt(seedSource));

    const lines = [];
    for (let i = 0; i < 6; i += 1) {
        let sum = 0;
        for (let c = 0; c < 3; c += 1) {
            sum += seededRandom() > 0.5 ? 3 : 2;
        }
        lines.push(sum);
    }

    const movingLines = [];
    const originalBinary = lines.map((line) => (line === 7 || line === 9 ? '1' : '0')).join('');
    const changedBinary = lines.map((line, idx) => {
        if (line === 6) {
            movingLines.push(idx + 1);
            return '1';
        }
        if (line === 9) {
            movingLines.push(idx + 1);
            return '0';
        }
        return line === 7 ? '1' : '0';
    }).join('');

    const originalHexagramNumber = binaryToHexagramNumber(originalBinary);
    const changedHexagramNumber = binaryToHexagramNumber(changedBinary);

    return {
        lines,
        movingLines,
        originalBinary,
        changedBinary,
        originalHexagram: HEXAGRAMS[originalHexagramNumber],
        changedHexagram: HEXAGRAMS[changedHexagramNumber]
    };
}

function calculateEMA(values, period) {
    const result = [];
    const multiplier = 2 / (period + 1);
    for (let i = 0; i < values.length; i += 1) {
        if (i === 0) {
            result.push(values[i]);
        } else {
            result.push((values[i] - result[i - 1]) * multiplier + result[i - 1]);
        }
    }
    return result;
}

function calculateMACD(closePrices) {
    const ema12 = calculateEMA(closePrices, 12);
    const ema26 = calculateEMA(closePrices, 26);
    const macdLine = ema12.map((v, i) => v - ema26[i]);
    const signalLine = calculateEMA(macdLine, 9);
    const histogram = macdLine.map((v, i) => v - signalLine[i]);
    const last = macdLine.length - 1;

    return {
        macdLine,
        signalLine,
        histogram,
        latest: {
            macd: macdLine[last] || 0,
            signal: signalLine[last] || 0,
            hist: histogram[last] || 0
        }
    };
}

function calculateATR(candles, period = 14) {
    if (candles.length < period + 1) return 0;
    const trs = [];
    for (let i = 1; i < candles.length; i += 1) {
        const current = candles[i];
        const prevClose = candles[i - 1].close;
        const tr = Math.max(
            current.high - current.low,
            Math.abs(current.high - prevClose),
            Math.abs(current.low - prevClose)
        );
        trs.push(tr);
    }

    let atr = trs.slice(0, period).reduce((s, v) => s + v, 0) / period;
    for (let i = period; i < trs.length; i += 1) {
        atr = ((atr * (period - 1)) + trs[i]) / period;
    }
    return atr;
}

function analyzePriceTrend(candles) {
    if (candles.length < 25) {
        return { trend: '中性', score: 0, detail: '样本较短，趋势判断中性。' };

    const ma20 = closes.slice(-20).reduce((s, v) => s + v, 0) / 20;
    const ma5 = closes.slice(-5).reduce((s, v) => s + v, 0) / 5;

    }
    return { trend: '震荡', score: 0, detail: '短中期均线交错，处于震荡整理状态。' };
}

function getElementInteraction(selfElement, externalElement) {
    if (!selfElement || !externalElement) {
        return { type: '未知', score: 0, text: '五行信息不足，无法判断内外互动。' };
    }
    if (selfElement === externalElement) {
        return { type: '比和', score: 1, text: '内外同气，行情一致性较好。' };
    }
    if (ELEMENT_GENERATES[externalElement] === selfElement) {
        return { type: '生扶', score: 2, text: '外盘生扶内盘，利于信心修复与趋势延续。' };
    }
    if (ELEMENT_GENERATES[selfElement] === externalElement) {
        return { type: '泄秀', score: 0, text: '内盘生外盘，动能外溢，需防止主升段提前消耗。' };
    }
    if (ELEMENT_CONTROLS[selfElement] === externalElement) {
        return { type: '可控', score: 1, text: '内盘可制外压，节奏可控但仍需量能确认。' };
    }
    if (ELEMENT_CONTROLS[externalElement] === selfElement) {
        return { type: '受制', score: -2, text: '外盘克制内盘，短期波动和回撤风险提升。' };
    }
    return { type: '中性', score: 0, text: '内外关系中性，建议等待更多共振信号。' };
}

function getSixKinRelation(lineElement, selfElement) {
    if (lineElement === selfElement) return '兄弟';
    if (ELEMENT_GENERATES[lineElement] === selfElement) return '父母';
    if (ELEMENT_GENERATES[selfElement] === lineElement) return '子孙';
    if (ELEMENT_CONTROLS[lineElement] === selfElement) return '官鬼';
    if (ELEMENT_CONTROLS[selfElement] === lineElement) return '妻财';
    return '兄弟';
}

function analyzeHexagramElements(hexagramData) {
    const binary = hexagramData?.originalBinary || '';
    if (binary.length !== 6) {
        return {
            lowerTrigram: { name: '未知', element: '未知' },
            upperTrigram: { name: '未知', element: '未知' },
            interaction: { type: '未知', score: 0, text: '卦体不完整，无法计算五行关系。' },
            lineRelations: [],
            relationCounts: { 兄弟: 0, 子孙: 0, 妻财: 0, 官鬼: 0, 父母: 0 },
            movingDetails: []
        };
    }
    const lowerKey = binary.slice(0, 3);
    const upperKey = binary.slice(3, 6);
    const lowerTrigram = TRIGRAMS[lowerKey] || { name: '未知', element: '未知' };
    const upperTrigram = TRIGRAMS[upperKey] || { name: '未知', element: '未知' };
    const interaction = getElementInteraction(lowerTrigram.element, upperTrigram.element);

    const lineElements = Array.from({ length: 6 }, (_, idx) => (idx < 3 ? lowerTrigram.element : upperTrigram.element));
    const lineRelations = lineElements.map((element) => getSixKinRelation(element, lowerTrigram.element));
    const relationCounts = lineRelations.reduce((acc, relation) => {
        acc[relation] = (acc[relation] || 0) + 1;
        return acc;
    }, { 兄弟: 0, 子孙: 0, 妻财: 0, 官鬼: 0, 父母: 0 });
    const movingDetails = (hexagramData.movingLines || []).map((lineNo) => ({
        lineNo,
        label: LINE_LABELS[lineNo - 1] || `第${lineNo}爻`,
        relation: lineRelations[lineNo - 1] || '未知',
        element: lineElements[lineNo - 1] || '未知'
    }));

    return {
        lowerTrigram,
        upperTrigram,
        interaction,
        lineRelations,
        relationCounts,
        movingDetails
    };
}

function calculateShiYing(hexagramNumber, originalBinary = '') {
    const lowerKey = originalBinary.length === 6 ? originalBinary.slice(0, 3) : '';
    const trigramOrder = ['111', '110', '101', '100', '011', '010', '001', '000'];
    const shiPattern = [6, 1, 2, 3, 4, 5, 4, 3];
    const trigramIndex = trigramOrder.indexOf(lowerKey);
    const shi = trigramIndex >= 0 ? shiPattern[trigramIndex] : ((hexagramNumber - 1) % 6) + 1;
    const ying = ((shi + 2 - 1) % 6) + 1;
    const elementMeta = originalBinary.length === 6 ? analyzeHexagramElements({ originalBinary, movingLines: [] }) : null;
    const relation = elementMeta
        ? `世应相对，${elementMeta.lowerTrigram.name}${elementMeta.upperTrigram.name}卦呈「${elementMeta.interaction.type}」关系。`
        : '世应相对，重视内外力量平衡。';
    return { shi, ying, relation, source: trigramIndex >= 0 ? '八宫世应简化定位' : '基础定位' };
}

        }

    const selected = map[questionType] || map.持仓;

    const movingPriority = elementAnalysis.movingDetails.filter((d) => selected.priorities.includes(d.relation)).length;
    const adverseCount = elementAnalysis.relationCounts.官鬼 || 0;

    let score = elementAnalysis.interaction.score;
    if (priorityCount >= 2) score += 1;
    if (movingPriority >= 1) score += 1;

    const strengthLevel = score >= 2 ? '强' : (score <= -1 ? '弱' : '中');
    const movingSummary = elementAnalysis.movingDetails.length
        ? elementAnalysis.movingDetails.map((d) => `${d.label}-${d.relation}`).join('，')

        : '当前动爻较少，结构相对稳定，适合按计划执行。';

        upperTrigram: elementAnalysis.upperTrigram,
        interaction: elementAnalysis.interaction,
        movingSummary,
        sixKinSnapshot,
        prioritiesText: selected.priorities.join(' + ')

function analyzeNewsSentiment(articles) {
    if (!articles || articles.length === 0) {
        return { sentiment: '中性', score: 0, summary: '未获取新闻或未启用API。' };
    }
    const positiveWords = ['上涨', '突破', '增长', '利好', '回购', '创新高', '增持', '超预期', '合作'];
    const negativeWords = ['下跌', '暴雷', '减持', '亏损', '处罚', '风险', '违约', '调查', '裁员', '下修'];

    let score = 0;
    articles.forEach((a) => {
        const text = `${a.title || ''} ${a.description || ''}`;
        positiveWords.forEach((w) => { if (text.includes(w)) score += 1; });
        negativeWords.forEach((w) => { if (text.includes(w)) score -= 1; });
    });

    if (score > 2) return { sentiment: '偏多', score: 2, summary: '新闻关键词整体偏正面，情绪支持风险偏好。' };
    if (score < -2) return { sentiment: '偏空', score: -2, summary: '新闻关键词整体偏负面，需警惕突发回撤。' };
    return { sentiment: '中性', score: 0, summary: '新闻情绪分化，未形成一致方向。' };
}

function generateComprehensiveStockJudgment(payload) {
    const { hexagramData, macdSignal, priceTrend, newsSentiment, questionType, yongShenScore = 0 } = payload;

    const baseHexScore = hexagramData.originalHexagram.energy + Math.sign(hexagramData.changedHexagram.energy || 0);
    const movingPenalty = hexagramData.movingLines.length >= 4 ? -1 : 0;
    const totalScore = baseHexScore + macdSignal.score + priceTrend.score + newsSentiment.score + movingPenalty + yongShenScore;

    let confidence = '中等';
    if (Math.abs(totalScore) >= 5) confidence = '高';
    else if (Math.abs(totalScore) <= 2) confidence = '低';

    let action = '观望等待';
    if (totalScore >= 5) action = '较强看多（可分批买入）';
    else if (totalScore >= 2) action = '谨慎偏多（回调布局）';
    else if (totalScore <= -5) action = '较强看空（减仓防守）';
    else if (totalScore <= -2) action = '谨慎偏空（控制仓位）';

    const reasons = [
        `卦象：${hexagramData.originalHexagram.name} → ${hexagramData.changedHexagram.name}`,
        `MACD：${macdSignal.signal}`,
        `趋势：${priceTrend.trend}`,
        `新闻：${newsSentiment.sentiment}`,
        `用神强度：${yongShenScore > 0 ? `+${yongShenScore}` : yongShenScore}`,
        `问题类型：${questionType}`
    ];

    return { totalScore, confidence, action, reasons };
}

function buildTencentSymbol(rawCode, market) {
    const symbol = normalizeStockCode(rawCode, market);
    if (!symbol) return '';
    const upper = symbol.toUpperCase();

    if (/^\d{6}\.SS$/.test(upper)) return `sh${upper.slice(0, 6)}`;
    if (/^\d{6}\.SZ$/.test(upper)) return `sz${upper.slice(0, 6)}`;
    if (/^\d{4,5}\.HK$/.test(upper)) return `hk${upper.slice(0, upper.indexOf('.')).padStart(5, '0')}`;
    if (/^[A-Z]+$/.test(upper)) return `us${upper}`;

    if (/^\d{6}$/.test(upper)) return upper.startsWith('6') || upper.startsWith('9') ? `sh${upper}` : `sz${upper}`;
    if (/^\d{4,5}$/.test(upper)) return `hk${upper.padStart(5, '0')}`;
    return '';
}

function loadScript(url, timeoutMs = 8000, charset = 'UTF-8') {
    return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = url;
        script.async = true;
        script.charset = charset;

        const cleanup = () => {
            script.onload = null;
            script.onerror = null;
            if (script.parentNode) script.parentNode.removeChild(script);
        };

        const timer = setTimeout(() => {
            cleanup();
            reject(new Error('脚本加载超时'));
        }, timeoutMs);

        script.onload = () => {
            clearTimeout(timer);
            cleanup();
            resolve();
        };
        script.onerror = () => {
            clearTimeout(timer);
            cleanup();
            reject(new Error('脚本加载失败'));
        };

        document.head.appendChild(script);
    });
}

async function fetchTencentRealtimePrice(rawCode, market) {
    const tencentSymbol = buildTencentSymbol(rawCode, market);
    if (!tencentSymbol) throw new Error('腾讯行情不支持当前代码格式');

    const variableName = `v_${tencentSymbol}`;
    const url = `https://qt.gtimg.cn/q=${encodeURIComponent(tencentSymbol)}&r=${Date.now()}`;
    await loadScript(url, 9000, 'GBK');

    const raw = window[variableName];
    if (!raw || typeof raw !== 'string') throw new Error('腾讯行情返回为空');
    const parts = raw.split('~');
    const price = Number(parts[3]);
    if (!Number.isFinite(price) || price <= 0) throw new Error('腾讯行情价格解析失败');

    const code = parts[2] || tencentSymbol;
    const name = parts[1] || '';
    delete window[variableName];
    return { price, code, name, provider: '腾讯实时行情' };
}

function alignCandlesToCurrentPrice(candles, targetPrice) {
    if (!Array.isArray(candles) || candles.length === 0 || !Number.isFinite(targetPrice) || targetPrice <= 0) {
        return candles;
    }
    const lastClose = Number(candles[candles.length - 1]?.close);
    if (!Number.isFinite(lastClose) || lastClose <= 0) return candles;
    const scale = targetPrice / lastClose;
    return candles.map((item) => ({
        ...item,
        open: item.open * scale,
        high: item.high * scale,
        low: item.low * scale,
        close: item.close * scale
    }));
}

function parseYahooResult(result, symbol) {
    const timestamps = result.timestamp || [];
    const quote = result.indicators?.quote?.[0];
    if (!quote) throw new Error('Yahoo指标数据缺失');

    const candles = [];
    for (let i = 0; i < timestamps.length; i += 1) {
        const open = quote.open?.[i];
        const high = quote.high?.[i];
        const low = quote.low?.[i];
        const close = quote.close?.[i];
        const volume = quote.volume?.[i] ?? 0;
        if ([open, high, low, close].some((v) => typeof v !== 'number' || Number.isNaN(v))) continue;
        candles.push({
            date: new Date(timestamps[i] * 1000).toISOString().slice(0, 10),
            open,
            high,
            low,
            close,
            volume
        });
    }
    if (candles.length < 35) throw new Error('有效K线数量不足');

    const marketPrice = Number(result.meta?.regularMarketPrice);
    const closeFallback = candles[candles.length - 1].close;
    const currentPrice = Number.isFinite(marketPrice) && marketPrice > 0 ? marketPrice : closeFallback;
    const marketSymbol = result.meta?.symbol || symbol;
    const priceSource = Number.isFinite(marketPrice) && marketPrice > 0 ? 'Yahoo实时成交价' : 'Yahoo最近收盘价';

    return {
        symbol,
        marketSymbol,
        currentPrice,
        candles,
        isRealtime: true,
        priceSource
    };
}

async function fetchYahooStockData(rawCode, market) {
    const symbol = normalizeStockCode(rawCode, market);
    if (!symbol) throw new Error('股票代码为空');
    const urls = buildYahooUrls(symbol);
    const errors = [];

    for (const url of urls) {
        try {
            const response = await fetchWithTimeout(url, 12000);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const result = data?.chart?.result?.[0];
            if (!result) throw new Error(data?.chart?.error?.description || 'Yahoo返回数据为空');
            return parseYahooResult(result, symbol);
        } catch (error) {
            errors.push(error.message || '未知错误');
        }
    }
    throw new Error(`Yahoo接口失败：${errors[0] || '请求失败'}`);
}

function generateMockStockData(rawCode, market) {
    const symbol = normalizeStockCode(rawCode, market);
    const seed = hashStringToInt(`${symbol}-${new Date().toISOString().slice(0, 10)}`);
    const random = createSeededRandom(seed);
    const candles = [];
    let close = 40 + random() * 90;

    for (let i = 120; i >= 0; i -= 1) {
        const drift = (random() - 0.48) * 2.8;
        const open = close;
        close = Math.max(3, open + drift);
        const high = Math.max(open, close) + random() * 1.4;
        const low = Math.max(1, Math.min(open, close) - random() * 1.2);
        const volume = Math.round((300000 + random() * 1500000) * (1 + Math.abs(drift) / 4));
        const date = new Date(Date.now() - i * 86400000).toISOString().slice(0, 10);
        candles.push({ date, open, high, low, close, volume });
    }

    return {
        symbol,
        marketSymbol: symbol,
        currentPrice: candles[candles.length - 1].close,
        candles,
        isRealtime: false,
        priceSource: '模拟价格模型'
    };
}

async function fetchStockData(rawCode, useRealtime, market) {
    if (!useRealtime) return generateMockStockData(rawCode, market);
    try {
        return await fetchYahooStockData(rawCode, market);
    } catch (error) {
        console.warn('实时数据失败，切换模拟数据：', error.message);
        const mock = generateMockStockData(rawCode, market);
        try {
            const tencent = await fetchTencentRealtimePrice(rawCode, market);
            const adjustedCandles = alignCandlesToCurrentPrice(mock.candles, tencent.price);
            return {
                ...mock,
                candles: adjustedCandles,
                currentPrice: tencent.price,
                marketSymbol: tencent.code || mock.marketSymbol,
                partialRealtime: true,
                priceSource: `${tencent.provider}（K线为模拟）`,
                realtimeError: error.message
            };
        } catch (tencentError) {
            return {
                ...mock,
                realtimeError: `${error.message}；备用行情失败：${tencentError.message}`
            };
        }
    }
}

async function fetchNews(stockCode, apiKey, market) {
    const safeApiKey = sanitizeApiKey(apiKey);
    if (!safeApiKey) return { articles: [], source: '未启用API' };
    const normalized = normalizeStockCode(stockCode, market);
    const symbolWithoutSuffix = normalized.replace(/\.[A-Z]{1,4}$/, '');
    const queryZh = encodeURIComponent(`${symbolWithoutSuffix} 股票 OR 上市公司`);
    const queryEn = encodeURIComponent(`${symbolWithoutSuffix} stock`);
    const directUrls = [
        {
            url: `https://gnews.io/api/v4/search?q=${queryZh}&lang=zh&country=cn&max=8&apikey=${encodeURIComponent(safeApiKey)}`,
            source: 'GNews 中文'
        },
        {
            url: `https://gnews.io/api/v4/search?q=${queryEn}&lang=en&max=8&apikey=${encodeURIComponent(safeApiKey)}`,
            source: 'GNews 国际'
        }
    ];
    const urls = [
        ...directUrls,
        ...directUrls.map((item) => ({
            url: `https://cors.isomorphic-git.org/${item.url}`,
            source: `${item.source}（代理）`
        }))
    ];
    const errors = [];

    for (const item of urls) {
        try {
            const response = await fetchWithTimeout(item.url, 10000);
            const data = await response.json();
            if (!response.ok) {
                const detail = (data?.errors || []).join('；') || data?.message || `HTTP ${response.status}`;
                throw new Error(detail);
            }
            return { articles: data.articles || [], source: item.source };
        } catch (error) {
            errors.push(error.message || '未知错误');
        }
    }
    throw new Error(`GNews接入失败：${errors[0] || '请求失败，请检查Key是否有效或是否达到免费配额上限'}`);
}

function calculateRiskControl(currentPrice, atr, capital, riskPercent) {
    const stopLoss = Math.max(0.01, currentPrice - atr * 2.2);
    const maxLoss = capital * (riskPercent / 100);
    const perShareRisk = Math.max(0.01, currentPrice - stopLoss);
    const shares = Math.floor(maxLoss / perShareRisk);
    return { stopLoss, maxLoss, perShareRisk, shares };
}

function renderHexagram(lines, movingLines, title) {
    const lineHtml = [...lines].reverse().map((line, reverseIndex) => {
        const lineNumber = 6 - reverseIndex;
        const isYang = line === 7 || line === 9;
        const isMoving = movingLines.includes(lineNumber);
        const mark = isMoving ? (line === 6 ? '老阴' : '老阳') : '';
        return `
            <div class="hex-line ${isYang ? '' : 'yin'} ${isMoving ? 'moving' : ''}">
                ${mark ? `<span class="line-tag">${mark}</span>` : ''}
            </div>
        `;
    }).join('');

    return `
        <div class="hex-visual">
            <div style="font-weight:700; margin-bottom:10px; color:#fbbf24;">${title}</div>
            <div style="display:inline-block; position:relative; padding-right:72px;">${lineHtml}</div>
        </div>
    `;
}

function renderMovingLineInterpretations(movingLines) {
    if (movingLines.length === 0) {
        return '<div class="advice-box">本次无动爻：卦意偏稳，当前更适合等待技术信号确认后再行动。</div>';
    }
    const content = movingLines.map((lineNo) => `<li>第${lineNo}爻：${MOVING_LINE_INTERPRETATIONS[lineNo]}</li>`).join('');
    return `<div class="advice-box"><strong>动爻解读：</strong><ul style="margin:8px 0 0 20px;">${content}</ul></div>`;
}

function getHistoryRecords() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [...FALLBACK_HISTORY];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [...FALLBACK_HISTORY];
    } catch (error) {
        return [...FALLBACK_HISTORY];
    }
}

function saveHistoryRecords(records) {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    } catch (error) {
        FALLBACK_HISTORY.length = 0;
        records.forEach((r) => FALLBACK_HISTORY.push(r));
    }
}

function saveAnalysisToHistory(entry) {
    const history = getHistoryRecords();
    history.unshift(entry);
    const sliced = history.slice(0, HISTORY_LIMIT);
    saveHistoryRecords(sliced);
}

function renderHistoryList() {
    const historyList = document.getElementById('historyList');
    const history = getHistoryRecords();
    if (history.length === 0) {
        historyList.innerHTML = '<div style="color:#94a3b8;">暂无历史记录</div>';
        return;
    }
    historyList.innerHTML = history.map((item, index) => `
        <div class="history-item" onclick="showHistoryDetail(${index})">
            <div><strong>${item.stockCode}</strong> · ${item.questionType} · ${item.action}</div>
            <div style="color:#94a3b8; font-size:0.82rem; margin-top:4px;">
                ${item.originalHexagram} → ${item.changedHexagram} | 动爻: ${item.movingLinesText} | ${item.timestamp}
            </div>
        </div>
    `).join('');
}

function showHistoryDetail(index) {
    const history = getHistoryRecords();
    const item = history[index];
    if (!item) return;
    alert(
        `时间: ${item.timestamp}\n` +
        `股票: ${item.stockCode}\n` +
        `问题类型: ${item.questionType}\n` +
        `本卦: ${item.originalHexagram}\n` +
        `变卦: ${item.changedHexagram}\n` +
        `动爻: ${item.movingLinesText}\n` +
        `数据源: ${item.dataType}\n` +
        `综合建议: ${item.action}`
    );
}

function clearHistory() {
    if (!confirm('确定清空全部历史记录吗？')) return;
    saveHistoryRecords([]);

async function performAnalysis(useRealtime) {
    const stockCode = getInputValue('stockCode').trim();
    const market = getInputValue('market');
    const capital = Number(getInputValue('capital'));
    const riskPercent = Number(getInputValue('riskPercent'));
    const newsApiKey = getInputValue('newsApiKey');
    const question = getInputValue('question').trim();
    const questionType = getInputValue('questionType');
    const advancedMode = document.getElementById('advancedMode').checked;
    const resultsNode = document.getElementById('results');

    if (!stockCode || !question) {
        alert('请填写股票代码与问题描述。');
        return;
    }
    if (capital <= 0 || riskPercent <= 0) {
        alert('资金与风险比例必须大于0。');
        return;
    }

    setButtonsLoading(true);
    try {
        const normalizedCode = normalizeStockCode(stockCode, market);
        const hexagramData = generateHexagramWithChangingLines(normalizedCode, question);
        const stockData = await fetchStockData(stockCode, useRealtime, market);
        const closePrices = stockData.candles.map((c) => c.close);
        const macdData = calculateMACD(closePrices);
        const macdSignal = getSignalFromMACD(macdData);
        const atr = calculateATR(stockData.candles, 14);
        const riskResult = calculateRiskControl(stockData.currentPrice, atr, capital, riskPercent);
        const trendResult = analyzePriceTrend(stockData.candles);

        let newsResult = { articles: [], source: '未启用API' };
        try {
            newsResult = await fetchNews(stockCode, newsApiKey, market);
        } catch (error) {
            newsResult = { articles: [], source: error.message || 'GNews请求失败' };
        }
        const sentimentResult = analyzeNewsSentiment(newsResult.articles);

        const yongShen = getYongShenInterpretation(questionType, hexagramData);
        const judgment = generateComprehensiveStockJudgment({
            hexagramData,
            macdSignal,
            priceTrend: trendResult,
            newsSentiment: sentimentResult,
            questionType,
            yongShenScore: yongShen.score
        });
        const shiYing = calculateShiYing(hexagramData.originalHexagram.number, hexagramData.originalBinary);

        const movingLinesText = hexagramData.movingLines.length ? hexagramData.movingLines.join('、') : '无';
        resultsNode.style.display = 'block';
        resultsNode.innerHTML = `
            ${renderComprehensiveJudgment(judgment)}

                            [],
                            `变卦：${hexagramData.changedHexagram.name}`
                        )}
                    </div>

                        <strong>本卦卦辞：</strong>${hexagramData.originalHexagram.guaCi}<br>
                        <strong>本卦建议：</strong>${hexagramData.originalHexagram.stockAdvice}<br>
                        <strong>变卦建议：</strong>${hexagramData.changedHexagram.stockAdvice}
                    </div>
                    <div style="margin-top:12px;">${renderMovingLineInterpretations(hexagramData.movingLines)}</div>
                    ${advancedMode ? `
                        <div class="advice-box" style="margin-top:12px;">
                            <strong>高级模式（世应 + 用神）</strong><br>
                            世爻：第${shiYing.shi}爻｜应爻：第${shiYing.ying}爻<br>
                            ${shiYing.relation}（${shiYing.source}）<br>
                            <strong>卦体五行：</strong>下卦${yongShen.lowerTrigram.name}(${yongShen.lowerTrigram.element}) / 上卦${yongShen.upperTrigram.name}(${yongShen.upperTrigram.element})<br>
                            <strong>内外关系：</strong>${yongShen.interaction.type}｜${yongShen.interaction.text}<br>
                            <strong>用神重点：</strong>${yongShen.focus}（六亲优先：${yongShen.prioritiesText}）<br>

                            <strong>动爻六亲：</strong>${yongShen.movingSummary}<br>

                            ? `<br><span style="color:#facc15;">Yahoo实时失败，已使用腾讯实时价格：${stockData.realtimeError}</span>`
                            : (stockData.realtimeError ? `<br><span style="color:#fca5a5;">实时请求失败，已切换模拟：${stockData.realtimeError}</span>` : '')
                        }
                    </div>

                <h2 class="section-title">📊 图表与K线明细</h2>
                <div class="chart-container" style="height:260px;"><canvas id="priceChart"></canvas></div>
                <div class="chart-container" style="height:190px;"><canvas id="volumeChart"></canvas></div>
                <div class="chart-container" style="height:220px;"><canvas id="macdChart"></canvas></div>
                ${renderKlineTable(stockData.candles)}
            </div>

            ${renderNews(newsResult.articles, sentimentResult, newsResult.source)}
        `;

        renderCharts(stockData, macdData);
        saveAnalysisToHistory({
            timestamp: new Date().toLocaleString('zh-CN', { hour12: false }),
            stockCode: normalizeStockCode(stockCode, market),
            questionType,
            originalHexagram: hexagramData.originalHexagram.name,
            changedHexagram: hexagramData.changedHexagram.name,
            movingLinesText,
            dataType: stockData.isRealtime ? '实时/兜底模拟' : '模拟',
            action: judgment.action
        });
        renderHistoryList();
    } catch (error) {
        console.error(error);
        alert(`分析失败：${error.message}`);
    } finally {
        setButtonsLoading(false);
    }
}

updateStockInputHint();
renderHistoryList();
